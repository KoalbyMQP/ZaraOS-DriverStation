name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: ./driver-station
    steps:
      - uses: actions/checkout@v4

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: driver-station/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

