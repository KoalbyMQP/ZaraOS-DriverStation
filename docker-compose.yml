services:
  frontend:
    build:
      context: ./driver-station
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AZURE_CLIENT_ID: ${NEXT_PUBLIC_AZURE_CLIENT_ID}
        NEXT_PUBLIC_AZURE_TENANT_ID: ${NEXT_PUBLIC_AZURE_TENANT_ID}
        NEXT_PUBLIC_REDIRECT_URI: ${NEXT_PUBLIC_REDIRECT_URI:-http://localhost:3000}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${NEXT_PUBLIC_AZURE_TENANT_ID}
    restart: unless-stopped
